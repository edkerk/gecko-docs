site_name: GECKO Toolbox 3.0 Protocol
site_description: >-
  Reconstruction, simulation and analysis of enzyme-constrained metabolic
  models using GECKO Toolbox 3.0
site_author: Chen, Gustafsson, Tafur Rangel et al.
repo_url: https://github.com/SysBioChalmers/GECKO
repo_name: SysBioChalmers/GECKO
edit_uri: ""

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        # Python API (geckopy) -- collected statically by griffe from the
        # submodule source, so the package does not need to be installed.
        python:
          paths: [geckopy/src]
          options:
            docstring_style: numpy
            docstring_section_style: table
            show_root_heading: false
            show_root_toc_entry: false
            show_source: false
            separate_signature: true
            show_signature_annotations: true
        # MATLAB API (GECKO) -- pure-Python tree-sitter collection, no MATLAB
        # runtime required. Functions are referenced by their file path
        # relative to this config (e.g. ::: ./GECKO/src/geckomat/.../foo.m).
        matlab:
          paths: [GECKO/src/geckomat]
          paths_recursive: true
          options:
            show_root_heading: false
            show_root_toc_entry: false
            show_source: false

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Introduction: introduction.md
  - Materials and installation: installation.md
  - Procedure:
      - Stage 0 - Preparation: stage0-preparation.md
      - Stage 1 - Structure expansion: stage1-structure-expansion.md
      - Stage 2 - kcat integration: stage2-kcat-integration.md
      - Stage 3 - Model tuning: stage3-model-tuning.md
      - Stage 4 - Proteomics integration: stage4-proteomics.md
      - Stage 5 - Simulation and analysis: stage5-simulation-analysis.md
  - Troubleshooting: troubleshooting.md
  - Anticipated results: anticipated-results.md
  - References: references.md
  - API reference:
      - Overview: api/index.md
      - Build an ecModel: api/build.md
      - Gather kcats: api/gather-kcats.md
      - Enzyme & EC data: api/enzyme-data.md
      - kcat sensitivity tuning: api/kcat-sensitivity.md
      - Limit proteins: api/limit-proteins.md
      - Simulation & utilities: api/simulation-utilities.md
      - Model adapter: api/adapter.md
