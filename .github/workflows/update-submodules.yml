name: Update submodules

on:
  schedule:
    - cron: '0 4 * * *'       # daily at 04:00 UTC
  workflow_dispatch: {}       # adds a "Run workflow" button for manual runs

permissions:
  contents: write             # needed to push the pointer commit

concurrency:                  # avoid overlapping runs racing on a commit
  group: update-submodules
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gecko-docs
        uses: actions/checkout@v5
        with:
          submodules: true
          fetch-depth: 1

      - name: Bump submodules to their tracked branches
        run: |
          # Fetch each submodule's tracked branch (from .gitmodules) and check
          # it out at its tip. Done explicitly because the submodules are
          # `shallow = true`, so only the pinned commit is present and
          # `git submodule update --remote` can't resolve the remote branch ref.
          # (GECKO -> develop4, geckopy -> develop)
          git submodule sync --recursive
          git submodule foreach '
            branch=$(git config -f "$toplevel/.gitmodules" "submodule.$name.branch" || echo main)
            echo "Updating $name -> $branch"
            git fetch --depth 1 origin "$branch"
            git checkout -B "$branch" FETCH_HEAD
          '

      - name: Commit & push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No submodule updates."
          else
            git add -A
            git commit -m "chore: update submodules to latest tracked branches"
            git push
          fi
