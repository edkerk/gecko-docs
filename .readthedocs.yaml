# Read the Docs configuration file for the GECKO 3.0 protocol
# See https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

# Pull in the GECKO (MATLAB) and geckopy (Python) sources tracked as
# git submodules, so their docstrings can be auto-documented.
submodules:
  include: all
  recursive: true

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    - requirements: requirements.txt
